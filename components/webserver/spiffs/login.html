<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Belépés</title>

<style>
  :root{--bg1:#071623;--bg2:#0b2236;--card:#0f1f2e;--muted:#7c8aa3;--text:#e8eef7;--accent:#2da8ff;--accent2:#57b6ff;--ok:#19c37d;--warn:#ffb020}
  *{box-sizing:border-box}

  body{
    margin:0;min-height:100vh;color:var(--text);
    font:14px/1.45 system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,sans-serif;
    background:
      radial-gradient(1100px 700px at 22% 28%, #0b2f58 0%, transparent 62%),
      radial-gradient(1100px 700px at 78% 62%, #0a2a49 0%, transparent 62%),
      linear-gradient(180deg, var(--bg1), var(--bg2));
  }

  .wrap{min-height:100svh;display:grid;place-items:center;padding:24px}

  .card{
    width:min(620px,92vw);
    background:color-mix(in srgb, var(--card) 92%, #000 8%);
    border:1px solid rgba(255,255,255,.06);
    border-radius:22px;
    padding:26px 26px 18px;
    box-shadow:0 18px 60px rgba(0,0,0,.45)
  }

  .head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .icon{
    width:36px;height:36px;
    border-radius:12px;
    background:linear-gradient(180deg,var(--accent),var(--accent2));
    display:grid;place-items:center;
    box-shadow:0 6px 20px rgba(45,168,255,.35)
  }
  .icon svg{width:20px;height:20px;fill:#00203a}
  h2{margin:0 0 2px;font-size:19px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:14px}

  label{display:block;font-size:12px;color:var(--muted);margin:10px 2px 6px}
  input{
    width:100%;padding:12px 14px;border-radius:12px;outline:0;
    border:1px solid rgba(255,255,255,.08);background:#0a1825;color:var(--text)
  }

  .pwd{position:relative}
  .pwd input{padding-right:46px}

  .pwd .toggle{
    position:absolute;top:50%;right:12px;transform:translateY(-50%);
    width:36px;height:28px;display:grid;place-items:center;
    border:1px solid rgba(255,255,255,.18);
    background:#0a1825;color:#aeb7c6;border-radius:8px;cursor:pointer
  }
  .pwd .toggle svg{width:18px;height:18px}

  .btn{
    width:100%;margin:18px 0 14px;padding:12px 14px;border-radius:14px;border:0;
    cursor:pointer;background:linear-gradient(180deg,var(--accent),var(--accent2));
    color:#00203a;font-weight:800;font-size:15px
  }

  table{width:100%;border-collapse:collapse;margin-top:10px}
  th,td{padding:8px 10px;border-top:1px solid rgba(255,255,255,.06);font-size:12px}
  th{color:var(--muted)}

  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
  .ok{background:var(--ok)}.warn{background:var(--warn)}.off{background:#777}

  .foot{color:var(--muted);font-size:11px;text-align:center;margin-top:10px}
</style>
</head>

<body>
<div class="wrap">
<form class="card" onsubmit="event.preventDefault(); login();">

  <div class="head">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 0 1 2 2v1.1a7.9 7.9 0 0 1 4.9 4.9H20a2 2 0 1 1 0 4h-1.1a7.9 7.9 0 0 1-4.9 4.9V20a2 2 0 1 1-4 0v-1.1a7.9 7.9 0 0 1-4.9-4.9H4a2 2 0 1 1 0-4h1.1a7.9 7.9 0 0 1 4.9-4.9V4a2 2 0 0 1 2-2Z"/></svg>
    </div>
    <div>
      <h2>Belépés</h2>
      <div id="subtitle" class="sub">Betöltés…</div>
    </div>
  </div>

  <!-- Username -->
  <label for="user">Felhasználónév</label>
  <input id="user" autocomplete="username" placeholder="pl. admin">

  <!-- Password -->
  <label for="pwd">Jelszó</label>
  <div class="pwd">
    <input id="pwd" type="password" autocomplete="current-password" placeholder="••••••••">
    <button type="button" class="toggle" onclick="togglePwd()">
      <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7Z"/><circle cx="12" cy="12" r="2.5"/></svg>
    </button>
  </div>

  <button class="btn" type="submit">Belépés</button>

  <div style="margin-top:12px;border-top:1px solid rgba(255,255,255,.06);padding-top:10px">
    <div class="sub" style="margin:0 0 6px">Eszköz állapot</div>

    <table>
      <tr>
        <th>Státusz</th>
        <th>ID</th>
        <th>Utolsó mérés [s]</th>
        <th>Feszültség [V]</th>
      </tr>
      <tbody id="status-body">
        <tr><td colspan="4" class="sub">Töltés…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="foot" id="msg"></div>

</form>
</div>

<script>
function togglePwd(){
  const inp = document.getElementById('pwd');
  const eye = document.getElementById('eyeIcon');
  if(inp.type === 'password'){
    inp.type='text';
    eye.innerHTML='<path d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7Z"/><circle cx="12" cy="12" r="2.5"/><line x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="2"/>';
  }else{
    inp.type='password';
    eye.innerHTML='<path d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7Z"/><circle cx="12" cy="12" r="2.5"/>';
  }
}

async function loadSubtitle(){
  try{
    const r = await fetch('/api/config',{cache:'no-store'});
    if(!r.ok) return;
    const c = await r.json();

    const zone = c.ZONE_NAME || "IPS zóna";
    const name = c.DEVICE_NAME || "eszköz";
    document.getElementById('subtitle').textContent =
      `${zone} – ${name} anchore`;
  }catch(e){
    document.getElementById('subtitle').textContent="IPS zóna – eszköz anchore";
  }
}

async function loadStatus(){
  try{
    const r = await fetch('/api/status',{cache:'no-store'});
    if(!r.ok) throw 0;
    const s = await r.json();

    const cls = s.state==='ok'?'ok':(s.state==='warn'?'warn':'off');

    document.getElementById('status-body').innerHTML =
      `<tr>
         <td><span class="dot ${cls}"></span>${s.hb_text}</td>
         <td>${s.id}</td>
         <td>${Number(s.last_s).toFixed(2)}</td>
         <td>${Number(s.last_v).toFixed(2)}</td>
       </tr>`;
  }catch(e){
    document.getElementById('status-body').innerHTML =
      '<tr><td colspan="4" class="sub">Nem érhető el az állapot.</td></tr>';
  }
}

async function login(){
  const user=document.getElementById('user').value.trim();
  const pass=document.getElementById('pwd').value;
  const msg=document.getElementById('msg');
  msg.textContent='';

  try{
    const r=await fetch('/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user,pass})
    });
    if(!r.ok){
      msg.textContent='Hibás felhasználónév vagy jelszó.';
      return;
    }
    window.location='/super_user.html';
  }catch(e){
    msg.textContent='Hálózati hiba.';
  }
}

loadSubtitle();
loadStatus();
setInterval(loadStatus,4000);
</script>

</body>
</html>
